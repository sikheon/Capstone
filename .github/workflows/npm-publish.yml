name: Publish flctl to npm

# Push a tag like `flctl-v0.1.0` to publish cli/ to npm.
#   git tag flctl-v0.1.0 && git push origin flctl-v0.1.0
# Requires repo secret NPM_TOKEN (npmjs.com → Access Tokens → Automation).
on:
  push:
    tags:
      - "flctl-v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        working-directory: cli
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#flctl-v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $TAG != package.json version $PKG"; exit 1
          fi

      - name: Install
        working-directory: cli
        run: npm install

      - name: Publish
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
